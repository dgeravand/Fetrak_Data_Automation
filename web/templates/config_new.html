{% extends "base.html" %}

{% block title %}New Config File - Fetrak{% endblock %}

{% block page_header %}
<div class="page-header">
    <h1>Create New Config File</h1>
</div>
{% endblock %}

{% block content %}

<form method="POST" class="job-form">
    <div class="form-section">
        <h2>Config File Details</h2>

        <div class="form-group">
            <label for="filename">File Name *</label>
            <input type="text" id="filename" name="filename" placeholder="my_config" required>
            <small>Will be saved as .yaml (e.g., my_config.yaml)</small>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Config File</button>
        <a href="{{ url_for('main.configs') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
